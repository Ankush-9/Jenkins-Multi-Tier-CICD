<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Save Customer</title>

    <style>
        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: linear-gradient(135deg, #dfe9f3, #ffffff);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 45%;
            margin: 60px auto;
            background: #ffffff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0px 6px 20px rgba(0, 0, 0, 0.12);
            animation: fadeIn 0.8s ease-in-out;
        }

        h3 {
            text-align: center;
            color: #34495e;
            font-size: 26px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .h4 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #ced6e0;
            font-size: 16px;
            transition: 0.2s;
        }

        input[type="text"]:focus {
            border-color: #1e90ff;
            outline: none;
            box-shadow: 0px 0px 6px rgba(30, 144, 255, 0.4);
        }

        button {
            background: #1e90ff;
            color: white;
            padding: 12px;
            width: 40%;
            display: block;
            margin: 0 auto;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #0b76d1;
            transform: scale(1.04);
        }

        /* Smooth fade animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

</head>

<body>

    <div class="container">

        <h3>Customer Information</h3>
        <hr>

        <p class="h4 mb-4">Save Customer Info</p>

        <form action="#" th:action="@{/registerCustomer}"
              th:object="${customer}" method="POST">

            <input type="hidden" th:field="*{id}" />

            <input type="text" th:field="*{firstName}" placeholder="First Name">

            <input type="text" th:field="*{lastName}" placeholder="Last Name">

            <input type="text" th:field="*{city}" placeholder="City">

            <button type="submit">Save</button>

        </form>

    </div>

</body>

</html>
